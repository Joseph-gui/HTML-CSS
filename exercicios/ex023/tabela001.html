<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        table {
            height:640px;
            width: 1500px;
            border-collapse: collapse;
            border: 5px solid black;
            margin: auto;
        }

        tr#linha1 {
            background-color: blue;
        }

        tr#linha2 {
            background-color: red;
        }

        tr#linha3 {
            background-color: purple;
        }

        tr#linha4 {
            background-color: orange;
        }

        td {
            border: 1px solid black;
            padding: 4px;
            text-align: center;
            vertical-align: middle;
        }

        td.dead {
            background-color: black;
            color: white;
        }

        td#num {
            text-align: right;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <table>
        <tr id="linha1">
            <td>A1</td>
            <td class="dead">B1</td>
            <td>C3</td>
        </tr>
        <tr id="linha2">
            <td>A2</td>
            <td class="dead">B2</td>
            <td>C2</td>
        </tr>
        <tr id="linha3">
            <td>A3</td>
            <td class="dead">B3</td>
            <td>C3</td>
        </tr>
        <tr id="linha4">
            <td>A4</td>
            <td id="num">300</td>
            <td>C4</td>
        </tr>
    </table>
</body>
</html>
