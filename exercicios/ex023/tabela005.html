<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas Responsivas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 600px;
            height: 50px;
        }

        td, th {
            border: 3px solid black;
            text-align: center;
        }

        caption {
            font-size: 1.3em;
            font-weight: bolder;
            padding: 10px;
        }

        tr:nth-child(even) {
            background-color: #808080;
        }
    </style>
</head>
<body>
    <h1>Tabelas em telas pequenas</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Fugiat sit omnis hic id quis alias autem esse illo aspernatur natus in, eos veniam, vitae expedita, delectus itaque a ducimus qui!</p>
    <table>
        <thead>
            <caption>Tabela Responsivas</caption>
            <tr>
                <th>Produto</th>
                <th>Jan</th>
                <th>Fev</th>
                <th>Mar</th>
                <th>Abr</th>
                <th>Mai</th>
                <th>Jun</th>
                <th>Jul</th>
                <th>Ago</th>
                <th>Sep</th>
                <th>Out</th>
                <th>Nov</th>
                <th>Dec</th>
            </tr>
        </thead>
    </table>
</body>
</html>
