<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela de treinos</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            border-collapse: collapse;
            width: 400px;
            height: 400px;
        }
        th, td {
            border: 2px solid black;
            text-align: center;
            padding: 5px;
        }

        th.cinza {
            background-color: grey;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Atividade 3</h1>
    <table>

                <th colspan="2" class="cinza">notas</th>
                <th rowspan="2" class="cinza">médias</th>
            </tr>

        </tr>
        <tr>

        <tr>

            <td>0.0</td>

        </tr>
        <tr>

</body>
</html>
