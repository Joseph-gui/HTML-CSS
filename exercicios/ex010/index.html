<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>midias em html</title>
</head>
<body>
    <h1>imagens dinamicas</h1>
    <p>aumente e diminua a imagem para testes praticos</p>
    <picture>
        <source media="(max-width: 700px )" srcset="imagens/vermelho.jpg" type="image/jpg">
        <source media="(max-width:1050px )" srcset="imagens/rosa.jpg" type="image/jpg">
        <img src="imagens/azul.jpg" alt=grande">
    </picture>
    <h1>musica da resenha</h1>
    <p>agora nós tem musica</p>
    <audio src="midia/icarus-starset.mp3.mp3" controls autoplay></audio>
    <h1>colocando videos no site</h1>
    <p>esses videos estão no proprio servidor</p>
    
</body>
</html>
